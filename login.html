<html>
    <head>
        <title>FriendlyChat Login</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
        <body>
        <nav class="menu">
            <div class="logobox" role="button" tabindex="0" onclick="window.location.href='index.html'">

                <h2 style="color: #740A03;">Chat</h2>
            </div>
            <div class="searchgen">

            <div class="items">

            <a><button class="logbut">Forgot password</button></a>
        </form>
        </div>
        <h6 class="notify">Don't have an account? Create a new account</h6>
